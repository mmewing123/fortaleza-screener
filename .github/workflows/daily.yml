name: Daily screen

on:
  schedule:
    - cron: "0 11 * * *"   # 08:00 America/Fortaleza (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install -U pip
          pip install -e .

      - name: Run pipeline
        run: |
          fortaleza pipeline --pages 3
          fortaleza top --n 25 > data/top25.txt
          fortaleza build-html

      - name: Commit updated database + docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fortaleza.duckdb data/top25.txt docs/index.html
          git diff --cached --quiet || git commit -m "daily: screen run $(date -u +%Y-%m-%d)"
          git push
